name: Update Skill Source Revisions

on:
  schedule:
    - cron: "23 4 * * 1"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: update-skill-source-revisions
  cancel-in-progress: false

env:
  UPDATE_BRANCH: chore/update-skill-source-revisions

jobs:
  update:
    name: Update pinned skill sources
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version-file: package.json

      - name: Install dependencies
        run: bun ci

      - name: Prepare update branch
        shell: bash
        env:
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if git ls-remote --exit-code --heads origin "$UPDATE_BRANCH" > /dev/null 2>&1; then
            git fetch origin "$UPDATE_BRANCH"
            git switch --create "$UPDATE_BRANCH" --track "origin/$UPDATE_BRANCH"
            git merge --no-edit "$GITHUB_SHA"
          else
            git switch --create "$UPDATE_BRANCH" "$GITHUB_SHA"
          fi

          echo "default_branch=$DEFAULT_BRANCH" >> "$GITHUB_ENV"

      - name: Resolve remote revisions
        id: revisions
        shell: bash
        run: |
          bun run registry:update | tee "$RUNNER_TEMP/registry-update.txt"
          if git diff --quiet -- registry/catalog.jsonc && \
             git diff --quiet "$GITHUB_SHA" -- registry/catalog.jsonc; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Validate updated skill sources
        if: steps.revisions.outputs.changed == 'true'
        run: bun run registry:validate --concurrency 3

      - name: Typecheck
        if: steps.revisions.outputs.changed == 'true'
        run: bun run typecheck

      - name: Test
        if: steps.revisions.outputs.changed == 'true'
        run: bun test

      - name: Build
        if: steps.revisions.outputs.changed == 'true'
        run: bun run build

      - name: Verify generated files are current
        if: steps.revisions.outputs.changed == 'true'
        run: |
          git diff --exit-code -- dist
          test -z "$(git status --porcelain --untracked-files=all -- dist)"

      - name: Commit and push update branch
        if: steps.revisions.outputs.changed == 'true'
        shell: bash
        run: |
          if ! git diff --quiet -- registry/catalog.jsonc; then
            git add registry/catalog.jsonc
            git commit -m "chore: update skill source revisions"
          fi
          git push --set-upstream origin "HEAD:$UPDATE_BRANCH"

      - name: Create or update pull request
        if: steps.revisions.outputs.changed == 'true'
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          cat > "$RUNNER_TEMP/pr-body.md" <<EOF
          Automated weekly refresh of commit-pinned git skill sources.

          Validation performed before this branch was pushed:

          - resolved each unique repository's remote HEAD without executing source hooks or scripts
          - cloned every updated pin with credentials, hooks, LFS smudging, and submodules disabled
          - discovered and validated every registered skill manifest
          - ran typecheck, tests, and build

          Revision resolver output:

          \`\`\`text
          $(cat "$RUNNER_TEMP/registry-update.txt")
          \`\`\`

          Workflow run: $GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID
          EOF

          PR_NUMBER=$(gh pr list \
            --repo "$GITHUB_REPOSITORY" \
            --base "$default_branch" \
            --head "$UPDATE_BRANCH" \
            --state open \
            --json number \
            --jq '.[0].number // empty')

          jq -n \
            --arg title "chore: update skill source revisions" \
            --arg body "$(cat "$RUNNER_TEMP/pr-body.md")" \
            '{title: $title, body: $body}' > "$RUNNER_TEMP/pr.json"

          if [[ -n "$PR_NUMBER" ]]; then
            gh api --method PATCH \
              "repos/$GITHUB_REPOSITORY/pulls/$PR_NUMBER" \
              --input "$RUNNER_TEMP/pr.json" > /dev/null
            echo "Updated pull request #$PR_NUMBER"
          else
            jq --arg head "$UPDATE_BRANCH" --arg base "$default_branch" \
              '. + {head: $head, base: $base}' \
              "$RUNNER_TEMP/pr.json" > "$RUNNER_TEMP/create-pr.json"
            gh api --method POST \
              "repos/$GITHUB_REPOSITORY/pulls" \
              --input "$RUNNER_TEMP/create-pr.json" \
              --jq '"Created pull request #\(.number): \(.html_url)"'
          fi
